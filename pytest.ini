[pytest]
# Pytest Configuration for Electronics Project
# Test Suite Modernization - October 2025

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    converter: Converter tests (6 tests, ~2 min each)
    validator: Validation tests (varies)
    simulation: Simulation tests (quick, <30s each)
    deep: Deep forensic tests (slow, skip in quick mode)
    integration: Full workflow tests (very slow)
    slow: Slow tests (>30s)
    fast: Fast tests (<10s)

# Default options
addopts =
    --verbose
    --tb=short
    --strict-markers
    --color=yes
    -ra

# Test paths
testpaths = tests

# Minimum Python version
minversion = 3.8

# Output options
console_output_style = progress

# Logging
log_cli = false
log_cli_level = INFO

# Timeout (prevent hanging tests)
timeout = 600

# Ignore paths
norecursedirs =
    .git
    .pytest_cache
    __pycache__
    archive
    integration

# Coverage options (if using pytest-cov)
# Uncomment to enable coverage reporting
# addopts = --cov=scripts --cov=workflow --cov-report=html --cov-report=term
